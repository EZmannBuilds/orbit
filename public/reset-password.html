<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- A recovery link must never be indexed, and must never leak through a
       referrer header to anything this page touches. -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <title>Reset your password — Orbit Axis</title>
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/components.css" />
</head>
<body>
  <!-- Structure mirrors the sign-in card in index.html so this page inherits
       the same styling rather than inventing a second look for one screen. -->
  <div class="auth-gate">
    <div class="auth-card">
      <div class="chat-orbit" aria-hidden="true"><span></span></div>
      <div>
        <h1>Choose a new password</h1>
        <p id="reset-intro">Enter a new password for your Orbit Axis account.</p>
      </div>

      <form id="reset-form" class="auth-form" novalidate>
        <label>New password
          <span class="password-row">
            <input type="password" id="reset-password" autocomplete="new-password" minlength="8" required />
            <button type="button" id="reset-toggle" aria-label="Show password">Show</button>
          </span>
        </label>
        <label>Confirm new password
          <input type="password" id="reset-confirm" autocomplete="new-password" minlength="8" required />
        </label>
        <button type="submit" id="reset-submit">Update password</button>
        <div class="auth-message" id="reset-message" role="status" aria-live="polite"></div>
      </form>

      <p class="auth-footnote"><a href="/">Back to Orbit Axis</a></p>
    </div>
  </div>

  <script type="module">
    // The recovery credential arrives in the URL. Supabase uses two shapes
    // depending on version and project settings, so both are accepted:
    //
    //   ?token_hash=…&type=recovery      (query)
    //   #access_token=…&type=recovery    (fragment)
    //
    // It is read once into memory and then stripped from the address bar. A
    // recovery token left in browser history is a live credential for as long
    // as it stays valid.
    const query = new URLSearchParams(location.search);
    const fragment = new URLSearchParams(location.hash.replace(/^#/, ""));
    const token = {
      access_token: fragment.get("access_token") || query.get("access_token") || "",
      token_hash: query.get("token_hash") || fragment.get("token_hash") || "",
    };
    const linkError = query.get("error_description") || fragment.get("error_description") || "";

    const $ = (id) => document.getElementById(id);
    const message = $("reset-message");
    const form = $("reset-form");
    const submit = $("reset-submit");
    const say = (text) => { message.textContent = text; };

    if (history.replaceState) history.replaceState(null, "", location.pathname);

    if (linkError) {
      say(linkError.replace(/\+/g, " "));
      form.hidden = true;
    } else if (!token.access_token && !token.token_hash) {
      // Someone opened this page directly rather than through an email. Say so
      // plainly instead of showing a form that cannot possibly work.
      $("reset-intro").textContent =
        "This page needs a reset link to work. Open the link from your password-reset email, "
        + "or request a new one from the sign-in screen.";
      form.hidden = true;
    }

    $("reset-toggle").addEventListener("click", () => {
      const input = $("reset-password");
      const showing = input.type === "text";
      input.type = showing ? "password" : "text";
      $("reset-confirm").type = input.type;
      $("reset-toggle").textContent = showing ? "Show" : "Hide";
      $("reset-toggle").setAttribute("aria-label", showing ? "Show password" : "Hide password");
    });

    let submitting = false;
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (submitting) return;                       // no duplicate submissions

      const password = $("reset-password").value;
      const confirm = $("reset-confirm").value;
      if (password.length < 8) return say("Password must be at least 8 characters.");
      if (password !== confirm) return say("Passwords do not match.");

      submitting = true;
      submit.disabled = true;
      say("Updating your password…");

      try {
        const res = await fetch("/api/auth/password/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...token, password, confirm_password: confirm }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          say(data.error || "That did not work. Request a new reset link and try again.");
          submitting = false;
          submit.disabled = false;
          return;
        }
        say(data.message || "Password updated. Taking you to sign in…");
        form.hidden = true;
        setTimeout(() => { location.href = "/"; }, 1800);
      } catch {
        // A network failure is not a rejected password, and the person should
        // be told which one happened.
        say("Could not reach Orbit. Check your connection and try again.");
        submitting = false;
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
